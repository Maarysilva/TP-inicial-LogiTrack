{% extends "base.html" %}
{% block title %}Nuevo Envío · LogiTrack{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Nuevo Envío</h1>
        <p class="page-subtitle">Completá los datos para registrar el envío</p>
    </div>
    <a href="{{ url_for('listar_envios') }}" class="btn btn-secondary">← Volver</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('nuevo_envio') }}">
        <div class="form-section">
            <h3 class="form-section-title">👤 Remitente y Destinatario</h3>
            <div class="form-row">
                <div class="form-group"><label>Nombre del Remitente <span class="required">*</span></label><input type="text" name="remitente_nombre" value="{{ form.get('remitente_nombre','') }}" required></div>
                <div class="form-group"><label>DNI del Remitente <span class="required">*</span></label><input type="text" name="remitente_dni" value="{{ form.get('remitente_dni','') }}" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Dirección del Remitente <span class="required">*</span></label><input type="text" name="remitente_direccion" value="{{ form.get('remitente_direccion','') }}" placeholder="Calle, número, ciudad, provincia" required></div>
                <div class="form-group"><label>Teléfono del Remitente <span class="required">*</span></label><input type="tel" name="remitente_telefono" value="{{ form.get('remitente_telefono','') }}" placeholder="+54 XXX XXX-XXXX" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email del Remitente</label><input type="email" name="remitente_email" value="{{ form.get('remitente_email','') }}" placeholder="remitente@email.com"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Nombre del Destinatario <span class="required">*</span></label><input type="text" name="destinatario_nombre" value="{{ form.get('destinatario_nombre','') }}" required></div>
                <div class="form-group"><label>DNI del Destinatario <span class="required">*</span></label><input type="text" name="destinatario_dni" value="{{ form.get('destinatario_dni','') }}" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Dirección del Destinatario <span class="required">*</span></label><input type="text" name="destinatario_direccion" value="{{ form.get('destinatario_direccion','') }}" placeholder="Calle, número, ciudad, provincia" required></div>
                <div class="form-group"><label>Teléfono del Destinatario <span class="required">*</span></label><input type="tel" name="destinatario_telefono" value="{{ form.get('destinatario_telefono','') }}" placeholder="+54 XXX XXX-XXXX" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email del Destinatario</label><input type="email" name="destinatario_email" value="{{ form.get('destinatario_email','') }}" placeholder="destinatario@email.com"></div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="form-section-title">📍 Ruta del Envío</h3>
            <div class="form-row">
                <div class="form-group"><label>Ciudad de Origen <span class="required">*</span></label><input type="text" name="origen" value="{{ form.get('origen','') }}" required></div>
                <div class="form-group"><label>Ciudad de Destino <span class="required">*</span></label><input type="text" name="destino" value="{{ form.get('destino','') }}" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="form-section-title">📐 Datos del Paquete</h3>
            <div class="form-row">
                <div class="form-group"><label>Peso (kg) <span class="required">*</span></label><input type="number" step="0.1" min="0" name="peso" value="{{ form.get('peso','') }}" required></div>
                <div class="form-group"><label>Dimensiones <span class="required">*</span></label><input type="text" name="dimensiones" value="{{ form.get('dimensiones','') }}" placeholder="Ej: 30x20x10 cm" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="form-section-title">📝 Descripción del Contenido</h3>
            <div class="form-group"><label>Descripción (opcional)</label><textarea name="descripcion" rows="3">{{ form.get('descripcion','') }}</textarea></div>
        </div>

        <div class="form-section">
            <label class="checkbox-row">
                <input type="checkbox" name="acepta_ley" {% if form.get('acepta_ley') %}checked{% endif %} required>
                <span>Acepto términos y política de privacidad (Ley 25.326). <a href="#">Ver política</a>.</span>
            </label>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('listar_envios') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Registrar Envío</button>
        </div>
    </form>
</div>
{% endblock %}
